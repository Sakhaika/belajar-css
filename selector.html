<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selector CSS</title>
    <style>
        h1, h2, h3, #belajar, .belajar {
            color: red;
        }
    </style>
  </head>
  <body>
    <h1>belajar selector</h1>
    <h2>belajar</h1>
    <h3>selector</h2>

    <p class="belajar">ini merupakan contoh</p>
    <p id="belajar">ini juga contoh</p>
  </body>
</html>
